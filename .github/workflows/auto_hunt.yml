name: Autonomous Scope Hunt Trigger

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      reset_snapshot:
        description: "Reset .previous_assets to current assets.out and exit without alerts"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  detect-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set git identity
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Fetch bounty-targets-data
        uses: actions/checkout@v4
        with:
          repository: arkadiyt/bounty-targets-data
          path: bounty-targets-data
          fetch-depth: 1

      - name: Extract paid assets
        run: |
          mkdir -p data

          jq -r '.[] | select(.max_payout > 0) | .targets.in_scope[].target' \
            bounty-targets-data/data/bugcrowd_data.json \
            | grep -v '\*' \
            | sed -E 's#^https?://##; s#/.*$##' \
            | sed '/^[[:space:]]*$/d' \
            > data/bugcrowd.txt || :

          jq -r '.[] | select(.offers_bounties == true) | .targets.in_scope[].asset_identifier' \
            bounty-targets-data/data/hackerone_data.json \
            | grep -v '\*' \
            | sed -E 's#^https?://##; s#/.*$##' \
            | sed '/^[[:space:]]*$/d' \
            > data/hackerone.txt || :

      - name: Merge assets
        run: |
          cat data/* > assets.out || :
          sort -u assets.out -o assets.out
          echo "Total assets extracted: $(wc -l < assets.out)"

      - name: Initialize previous_assets if missing
        run: |
          if [ ! -f .previous_assets ]; then
            cp assets.out .previous_assets
            : > new_added_assets.out
            echo "Initialized .previous_assets from current snapshot. Monitoring starts now."
          fi

      - name: Reset snapshot if requested
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_snapshot == 'true' }}
        run: |
          cp assets.out .previous_assets
          : > new_added_assets.out
          echo "Snapshot reset completed. No alerts will be sent in this run."

      - name: Commit reset snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_snapshot == 'true' }}
        run: |
          git add .previous_assets assets.out new_added_assets.out data/ || :
          git diff --cached --quiet && exit 0
          git commit -m "Reset scope snapshot $(date -u)"
          git push

      - name: Stop after reset
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_snapshot == 'true' }}
        run: exit 0

      - name: Find new assets since previous snapshot
        run: |
          grep -Fxvf .previous_assets assets.out > new_added_assets.out || :

          echo "previous_assets count: $(wc -l < .previous_assets)"
          echo "assets.out count: $(wc -l < assets.out)"
          echo "new_added_assets.out count: $(wc -l < new_added_assets.out)"

          if [ -s new_added_assets.out ]; then
            echo "New assets found:"
            head -n 50 new_added_assets.out
          else
            echo "No new assets found."
          fi

      - name: Trigger Kali webhook and send one Telegram summary
        run: |
          if [ -s new_added_assets.out ]; then
            rm -f successful_assets.tmp

            while IFS= read -r asset; do
              [ -z "$asset" ] && continue

              echo "Triggering hunt for: $asset"

              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.KALI_WEBHOOK_URL }}/webhook/new-scope" \
                -H "Content-Type: application/json" \
                -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
                -d "{
                  \"domain\": \"${asset}\",
                  \"program\": \"unknown\",
                  \"platform\": \"mixed\"
                }")

              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              echo "Response: $BODY"
              echo "Status: $HTTP_CODE"

              if [ "$HTTP_CODE" = "200" ]; then
                echo "$asset" >> successful_assets.tmp
                echo "Queued successfully: $asset"
              else
                echo "Failed to trigger webhook for $asset (HTTP $HTTP_CODE)"
              fi
            done < new_added_assets.out

            if [ -f successful_assets.tmp ] && [ -s successful_assets.tmp ]; then
              SUCCESS_COUNT=$(wc -l < successful_assets.tmp)
              SUCCESS_LIST=$(head -n 20 successful_assets.tmp)

              MSG=$(printf "Queued %s new assets since previous snapshot\n\n%s\n\nWorkflow: %s\nRepo: %s\nRun: https://github.com/%s/actions/runs/%s" \
                "$SUCCESS_COUNT" \
                "$SUCCESS_LIST" \
                "${{ github.workflow }}" \
                "${{ github.repository }}" \
                "${{ github.repository }}" \
                "${{ github.run_id }}")

              curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                --data "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                --data-urlencode "text=${MSG}" > /dev/null

              echo "Sent one Telegram summary for $SUCCESS_COUNT assets"
            else
              echo "No successful webhook submissions; no Telegram summary sent."
            fi
          else
            echo "No new scopes found."
          fi

      - name: Update previous snapshot
        run: |
          cp assets.out .previous_assets

      - name: Commit monitoring state
        run: |
          git add .previous_assets assets.out new_added_assets.out data/ || :
          git diff --cached --quiet && exit 0
          git commit -m "Update scope snapshot $(date -u)"
          git push
